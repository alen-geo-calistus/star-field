<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calming Starfield</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="title">✦ STARFIELD ✦</div>
    
    <canvas id="starfield"></canvas>
    
    <div class="controls">
        <button class="control-btn active" id="warpBtn">WARP MODE</button>
        <button class="control-btn" id="calmBtn">CALM MODE</button>
        <button class="control-btn" id="rainbowBtn">RAINBOW</button>
    </div>
    
    <div class="info">Move your mouse to guide the stars ✧</div>

    <script src="index.js"></script>
</body>
</html>
